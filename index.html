<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGPU Path-Traced Doom</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
    }
    #error {
      color: #ff6b6b;
      padding: 2rem;
      text-align: center;
      display: none;
    }
    #container {
      position: relative;
    }
    canvas {
      display: block;
      max-width: 100%;
      max-height: 100vh;
    }
    #hint {
      position: absolute;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.875rem;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #hint.hidden {
      opacity: 0;
    }
    #controls {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(0, 0, 0, 0.8);
      padding: 1rem;
      border-radius: 8px;
      color: white;
      font-size: 0.875rem;
      min-width: 220px;
    }
    #controls label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    #controls input[type="range"] {
      width: 80px;
    }
    #controls input[type="checkbox"] {
      width: 18px;
      height: 18px;
    }
    #controls .value {
      min-width: 45px;
      text-align: right;
      font-family: monospace;
    }
    #controls select {
      background: #333;
      color: white;
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
    }
    #stats {
      font-family: monospace;
      font-size: 0.8rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      line-height: 1.4;
    }
    #stats .stat-row {
      display: flex;
      justify-content: space-between;
    }
    #stats .stat-value {
      color: #8f8;
    }
  </style>
</head>
<body>
  <div id="error"></div>
  <div id="container">
    <canvas id="canvas" width="1280" height="800"></canvas>
    <div id="hint">Click to capture mouse | WASD to move | Q/E to rotate | Space/Shift for up/down | ESC to release</div>
    <div id="controls">
      <div id="stats">
        <div class="stat-row"><span>FPS:</span> <span class="stat-value" id="fps-value">--</span></div>
        <div class="stat-row"><span>Rays/sec:</span> <span class="stat-value" id="rays-value">--</span></div>
        <div class="stat-row"><span>Samples:</span> <span class="stat-value" id="samples-display">--</span></div>
        <div class="stat-row"><span>Resolution:</span> <span class="stat-value" id="res-display">--</span></div>
      </div>
      <label>
        <span>Samples/pixel</span>
        <input type="range" id="samples" min="0" max="16" value="4">
        <span class="value" id="samples-value">16</span>
      </label>
      <label>
        <span>Max bounces</span>
        <input type="range" id="bounces" min="1" max="10" value="4">
        <span class="value" id="bounces-value">4</span>
      </label>
      <label>
        <span>Resolution</span>
        <select id="resolution">
          <option value="0.25" selected>0.25x</option>
          <option value="0.5">0.5x</option>
          <option value="0.75">0.75x</option>
          <option value="1.0">1.0x</option>
          <option value="2.0">2.0x</option>
        </select>
      </label>
      <label>
        <span>Temporal</span>
        <input type="checkbox" id="temporal">
      </label>
      <label>
        <span>Denoise</span>
        <input type="checkbox" id="denoise" checked>
      </label>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
